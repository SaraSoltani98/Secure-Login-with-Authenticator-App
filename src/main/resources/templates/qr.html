<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>QR-kod</title>
</head>
<body>

<h1>Skanna QR-koden</h1>

<p>
    Skanna QR-koden med Microsoft Authenticator
    eller Google Authenticator.
</p>

<img th:src="'data:image/png;base64,' + ${qrCodeImage}"
     alt="QR Code">

<br><br>

<p>
    Konto: <span th:text="${email}"></span>
</p>

<br>

<a href="/login">Fortsätt till inloggning</a>

</body>
</html>
